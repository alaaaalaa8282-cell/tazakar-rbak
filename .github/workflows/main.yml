name: Build and Release APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    name: Build Release APK
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Generate Keystore
        run: keytool -genkeypair -keystore app/keystore.jks -alias ${{ secrets.KEY_ALIAS }} -keyalg RSA -keysize 2048 -validity 10000 -storepass ${{ secrets.STORE_PASSWORD }} -keypass ${{ secrets.KEY_PASSWORD }} -dname "CN=alaaeltaweel, O=alaaeltaweel, C=EG" -storetype JKS

      - name: ⭐ COPY THIS - Keystore Base64
        run: |
          echo "====== COPY THE LINE BELOW TO KEYSTORE_BASE64 SECRET ======"
          base64 -w 0 app/keystore.jks
          echo ""
          echo "====== END ======"

      - name: Build Release APK
        run: ./gradlew assembleRelease --no-daemon
        env:
          KEYSTORE_PATH: keystore.jks
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          STORE_PASSWORD: ${{ secrets.STORE_PASSWORD }}

      - name: Create Release and Upload APK
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ github.run_number }}
          name: "محمد عبد العظيم اذكر ربك - إصدار ${{ github.run_number }}"
          files: app/build/outputs/apk/release/*.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
