name: Build and Release APK
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    name: Build Release APK
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Make gradlew executable
      run: chmod +x gradlew

    - name: Update version name
      run: |
        sed -i "s/versionName .*/versionName \"v${{ github.run_number }}\"/" app/build.gradle
        sed -i "s/versionCode .*/versionCode ${{ github.run_number }}/" app/build.gradle

    - name: Decode Keystore
      run: echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > app/keystore.jks

    - name: Build Release APK
      run: ./gradlew assembleRelease --no-daemon
      env:
        KEYSTORE_PATH: keystore.jks
        KEY_ALIAS: alaa-key-alias
        KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        STORE_PASSWORD: ${{ secrets.STORE_PASSWORD }}

    - name: Rename APK
      run: mv app/build/outputs/apk/release/app-release.apk app/build/outputs/apk/release/tazakkar.apk

    - name: Create Release and Upload APK
      uses: softprops/action-gh-release@v2
      with:
        tag_name: v${{ github.run_number }}
        name: "release-${{ github.run_number }}"
        files: app/build/outputs/apk/release/tazakkar.apk
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
